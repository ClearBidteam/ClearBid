            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        :root {
            --blue: #0d6efd;
            --dark-blue: #084298;
            --green: #20c997;
            --dark: #1d2633;
            --light: #f5f7fb;
            --white: #ffffff;
            --grey: #6c757d;
            --border: #e4e8ef;
        }

        body {
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
        }

        header {
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        nav {
            max-width: 1200px;
            margin: auto;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 30px;
            font-weight: 800;
            color: var(--blue);
            text-decoration: none;
        }

        .logo span {
            color: var(--dark);
        }

        nav ul {
            display: flex;
            align-items: center;
            gap: 26px;
            list-style: none;
        }

        nav a {
            color: var(--dark);
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        nav a:hover,
        nav a.active {
            color: var(--blue);
        }

        .signup-button {
            background: var(--blue);
            color: white !important;
            padding: 10px 18px;
            border-radius: 8px;
        }

        .signup-button:hover {
            background: var(--dark-blue);
        }

        .page-heading {
            background: linear-gradient(135deg, var(--blue), var(--green));
            color: var(--white);
            padding: 60px 25px;
            text-align: center;
        }

            font-size: clamp(34px, 6vw, 55px);
            margin-bottom: 10px;
        }

        .page-heading p {

            opacity: 0.95;
        }

            margin: -28px auto 30px;
            padding: 0 25px;
            position: relative;
        }
